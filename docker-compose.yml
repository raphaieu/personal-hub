services:

  # ---------------------------------------------------------------------------
  # App — Laravel PHP-FPM
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: raphael-hub:latest
    container_name: raphael-app
    user: "${PUID:-1003}:${PGID:-1003}"
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - TZ=America/Sao_Paulo
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=raphael-redis
      - DB_HOST=raphael-postgres
    volumes:
      - .:/var/www/html
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - raphael-bridge

  # ---------------------------------------------------------------------------
  # Nginx — reverse proxy para o PHP-FPM
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: raphael-nginx
    ports:
      - "8082:80"  # aaPanel faz proxy desse para api.raphael-martins.com
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - raphael-bridge

  # ---------------------------------------------------------------------------
  # PostgreSQL — banco exclusivo do projeto
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: raphael-postgres
    environment:
      POSTGRES_DB: raphael
      POSTGRES_USER: raphael_app
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      TZ: America/Sao_Paulo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - raphael-bridge

  # ---------------------------------------------------------------------------
  # Redis — filas, cache, sessão
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: raphael-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - raphael-bridge

  # ---------------------------------------------------------------------------
  # Horizon — monitor de filas
  # ---------------------------------------------------------------------------
  horizon:
    image: raphael-hub:latest
    container_name: raphael-horizon
    user: "${PUID:-1003}:${PGID:-1003}"
    env_file:
      - .env
    environment:
      - TZ=America/Sao_Paulo
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=raphael-redis
      - DB_HOST=raphael-postgres
    volumes:
      - .:/var/www/html
    depends_on:
      - app
      - redis
    command: php artisan horizon
    restart: unless-stopped
    networks:
      - raphael-bridge

  # ---------------------------------------------------------------------------
  # Queue Worker — fallback/overflow do Horizon
  # ---------------------------------------------------------------------------
  queue:
    image: raphael-hub:latest
    container_name: raphael-queue
    user: "${PUID:-1003}:${PGID:-1003}"
    env_file:
      - .env
    environment:
      - TZ=America/Sao_Paulo
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=raphael-redis
      - DB_HOST=raphael-postgres
    volumes:
      - .:/var/www/html
    depends_on:
      - app
      - redis
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=120
    restart: unless-stopped
    networks:
      - raphael-bridge

  # ---------------------------------------------------------------------------
  # Scheduler — executa artisan schedule:run a cada minuto
  # ---------------------------------------------------------------------------
  scheduler:
    image: raphael-hub:latest
    container_name: raphael-scheduler
    user: "${PUID:-1003}:${PGID:-1003}"
    env_file:
      - .env
    environment:
      - TZ=America/Sao_Paulo
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=raphael-redis
      - DB_HOST=raphael-postgres
    volumes:
      - .:/var/www/html
    depends_on:
      - app
      - redis
    command: >
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    restart: unless-stopped
    networks:
      - raphael-bridge

  # ---------------------------------------------------------------------------
  # Playwright — scraping Embasa e Coelba (com CapSolver)
  # ---------------------------------------------------------------------------
  playwright:
    build:
      context: .
      dockerfile: Dockerfile.playwright
    image: raphael-playwright:latest
    container_name: raphael-playwright
    environment:
      - TZ=America/Sao_Paulo
      - CAPSOLVER_API_KEY=${CAPSOLVER_API_KEY}
      - EMBASA_CPF=${EMBASA_CPF}
      - EMBASA_PASSWORD=${EMBASA_PASSWORD}
      - EMBASA_MATRICULA=${EMBASA_MATRICULA}
      - COELBA_CPF=${COELBA_CPF}
      - COELBA_PASSWORD=${COELBA_PASSWORD}
      - COELBA_CODIGO_CLIENTE=${COELBA_CODIGO_CLIENTE}
      - PORT=3001
    volumes:
      - ./playwright:/app
      - playwright_downloads:/app/downloads
    restart: unless-stopped
    networks:
      - raphael-bridge

volumes:
  postgres_data:
  redis_data:
  playwright_downloads:

networks:
  raphael-bridge:
    driver: bridge
