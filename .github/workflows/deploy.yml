name: Deploy Raphael Hub to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Instalar dependências Node e buildar assets
        run: |
          npm ci
          npm run build

      - name: Configurar chave SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ vars.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Sincronizar arquivos (ignora .env e vendor)
        run: |
          rsync -avz \
            --exclude='.env' \
            --exclude='vendor' \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='playwright/node_modules' \
            --exclude='storage/logs' \
            --exclude='storage/framework' \
            --exclude='bootstrap/cache' \
            --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            ./ deploy@${{ vars.VPS_HOST }}:/home/deploy/raphael-hub

      - name: Executar deploy remoto
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no deploy@${{ vars.VPS_HOST }} << 'ENDSSH'
            set -e
            cd /home/deploy/raphael-hub

            echo "--- Encerrando Horizon graciosamente ---"
            docker compose exec -T horizon php artisan horizon:terminate || true
            sleep 5

            echo "--- Permissões ---"
            mkdir -p storage/app/public storage/framework/{cache,sessions,views} storage/logs bootstrap/cache
            chmod -R ug+rwx storage bootstrap/cache
            chown -R deploy:deploy .

            echo "--- Dependências PHP ---"
            docker compose exec -T app composer install \
              --no-interaction \
              --prefer-dist \
              --optimize-autoloader \
              --no-dev

            echo "--- Dependências Playwright ---"
            if [ -d "playwright" ]; then
              cd playwright && npm ci --omit=dev && cd ..
            fi

            echo "--- Rebuild imagem app ---"
            docker compose build app playwright

            echo "--- Recrear containers ---"
            docker compose up -d --force-recreate --remove-orphans

            echo "--- Aguardar containers ---"
            sleep 15

            echo "--- Migrations ---"
            docker compose exec -T app php artisan migrate --force

            echo "--- Cache ---"
            docker compose exec -T app php artisan config:cache
            docker compose exec -T app php artisan route:cache
            docker compose exec -T app php artisan view:cache
            docker compose exec -T app php artisan horizon:publish

            echo "--- Status ---"
            docker compose ps

            echo "--- Health check ---"
            curl -sf http://127.0.0.1:8082/up && echo "✓ App OK" || echo "⚠ App não respondeu"

            echo "--- Limpeza imagens antigas ---"
            docker image prune -f || true

            echo "==============================="
            echo "Deploy concluído com sucesso!"
            echo "api.raphael-martins.com"
            echo "==============================="
          ENDSSH